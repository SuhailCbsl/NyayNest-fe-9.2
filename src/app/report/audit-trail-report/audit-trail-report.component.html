<!-- Top toolbar (Search + Dates + Export) -->
<div class="top-toolbar">
  <div class="toolbar-left">
    <!-- Search -->
    <div class="search-wrap">
      <input
        type="text"
        class="form-control"
        [placeholder]="'audit.trail.report.search.placeholder' | translate"
        [(ngModel)]="searchText"
        (input)="applyFilter()"
        aria-label="Search"
      />
      <span class="search-icon">
        <i class="pi pi-search"></i>
      </span>
    </div>

    <!-- From Date -->
    <div class="date-wrap">
      <input
        id="fromDate"
        type="text"
        placeholder="DD/MM/YYYY"
        ngbDatepicker
        #dFrom="ngbDatepicker"
        [(ngModel)]="fromDateModel"
        (dateSelect)="onFromDateSelect($event)"
        (click)="dFrom.toggle()"
        class="form-control"
        readonly
      />
      <span class="calendar-icon"><i class="pi pi-calendar"></i></span>
    </div>

    <!-- To Date -->
    <div class="date-wrap">
      <input
        id="toDate"
        type="text"
        placeholder="DD/MM/YYYY"
        ngbDatepicker
        #dTo="ngbDatepicker"
        [(ngModel)]="toDateModel"
        (dateSelect)="onToDateSelect($event)"
        (click)="dTo.toggle()"
        class="form-control"
        readonly
      />
      <span class="calendar-icon"><i class="pi pi-calendar"></i></span>
    </div>

    <!-- Search & Reset Buttons -->
    <div class="btn-cluster">
      <button type="button" class="btn btn-primary" (click)="searchAuditData()">
        {{ "audittrail.report.search" | translate }}
      </button>
      <button
        type="button"
        class="btn btn-outline-secondary"
        (click)="resetCalendar()"
      >
        {{ "audittrail.report.reset" | translate }}
      </button>
    </div>
  </div>

  <!-- Export Dropdown -->

    <div ngbDropdown class="d-inline-block">
      <button class="btn btn-outline-primary dropdown-toggle" ngbDropdownToggle>
        <i class="not-hovering">

      </button>
      <div ngbDropdownMenu class="dropdown-menu">
        <button ngbDropdownItem (click)="exportCSV()">
          {{ "audittrail.report.export.csv" | translate }}
        </button>
        <button ngbDropdownItem (click)="exportPDF()">
          {{ "audittrail.report.export.pdf" | translate }}
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Boxed Table with Horizontal Scroll -->
<div class="table-box">
  <div class="table-scroll">
    <table class="table audit-table">
      <thead>
        <tr>
          <th>S. No.</th>
          <th>User Email</th>
          <th>User ID</th>
          <th>Action</th>
          <th>Date & Time</th>
          <th>Handle</th>
          <th>URL</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let e of events; let i = index">
          <td class="sno">
            {{ (currentPage - 1) * resultsPerPage + i + 1 }}
          </td>
          <td>{{ e.userName }}</td>
          <td class="mono">{{ e.userId }}</td>
          <td class="action-td">{{ e.action }}</td>
          <td>{{ e.eventTime }}</td>
          <td>{{ handleDisplay(e?.handle) }}</td>
          <td class="url-cell">{{ e.url }}</td>
        </tr>

        <tr *ngIf="!isLoading && events.length === 0">
          <td colspan="6" class="text-center py-4">No records found.</td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Pagination -->
  <div class="pager">
    <ngb-pagination
      [collectionSize]="filteredEvents.length"
      [pageSize]="resultsPerPage"
      [(page)]="currentPage"
      [maxSize]="5"
      [boundaryLinks]="true"
      (pageChange)="onPageChange($event)"
    ></ngb-pagination>
  </div>
</div>
