<form #form="ngForm" (ngSubmit)="onSubmit(form.value)">
  <div class="search-controls d-flex flex-column gap-2">
    <!-- ROW 1: Search -->
    <div class="row1 d-flex align-items-center gap-2 flex-wrap">
      <!-- Scope -->
      <button
        class="browse-filter"
        [ngbTooltip]="
          isReset
            ? 'Filter NyayNest'
            : dsoNameService.getName(selectedScope | async)
        "
        type="button"
        (click)="openScopeModal()"
      >
        {{
          isReset
            ? ("search.form.scope.all" | translate)
            : dsoNameService.getName(selectedScope | async) ||
              ("search.form.scope.all" | translate)
        }}
      </button>

      <!-- Search Input (FIXED) -->
      <div class="search-container flex-grow-1">
        <input
          type="text"
          class="search-input form-control"
          [(ngModel)]="query"
          name="query"
          placeholder="Search Items"
          (keyup.enter)="onSubmit(form.value)"
        />
        <i class="search-icon fas fa-search"></i>
      </div>

      <!-- Search Type -->
      <div class="search-type-wrapper">
        <button
          pButton
          type="button"
          class="white-search-btn search-type-btn"
          [label]="searchButtonLabel"
          (click)="op.toggle($event)"
        >
          <i class="pi pi-filter"></i>
          <!-- <span>Search Type</span> -->
        </button>

        <p-popover #op [dismissable]="true" [appendTo]="'body'">
          <ng-template pTemplate="content">
            <div class="d-flex flex-column popver-coverage">
              <div
                class="search-option"
                [class.active]="searchType === 'normal'"
                (click)="selectSearchType('normal'); op.hide()"
              >
                Normal
              </div>

              <div
                class="search-option"
                [class.active]="searchType === 'fuzzy'"
                (click)="selectSearchType('fuzzy'); op.hide()"
              >
                Fuzzy Search
              </div>

              <div
                class="search-option"
                [class.active]="searchType === 'phonetic'"
                (click)="selectSearchType('phonetic'); op.hide()"
              >
                Phonetic Search
              </div>
            </div>
          </ng-template>
        </p-popover>
      </div>

      <!-- Date Range -->
      <div
        class="date-display-wrapper d-flex align-items-center gap-2 flex-wrap"
      >
        <!-- From -->
        <div class="date-wrap">
          <input
            id="fromDate"
            #fromNativeInput
            type="text"
            placeholder="From Date"
            ngbDatepicker
            #dFrom="ngbDatepicker"
            [(ngModel)]="fromDateModel"
            (ngModelChange)="onFromDateModelChange($event, 'from')"
            (dateSelect)="onFromDateSelect($event)"
            (click)="dFrom.toggle()"
            name="fromDate"
            class="form-control date-input-ngb"
            readonly
          />
          <button
            type="button"
            class="calendar-icon"
            (click)="dFrom.toggle()"
            aria-label="Open from calendar"
          >
            <i class="pi pi-calendar"></i>
          </button>
        </div>

        <!-- To -->
        <div class="date-wrap">
          <input
            #toNativeInput
            id="toDate"
            type="text"
            placeholder="To Date"
            ngbDatepicker
            #dTo="ngbDatepicker"
            [(ngModel)]="toDateModel"
            (ngModelChange)="onFromDateModelChange($event, 'to')"
            (dateSelect)="onToDateSelect($event)"
            (click)="dTo.toggle()"
            name="toDate"
            class="form-control date-input-ngb"
            readonly
          />
          <button
            type="button"
            class="calendar-icon"
            (click)="dTo.toggle()"
            aria-label="Open to calendar"
          >
            <i class="pi pi-calendar"></i>
          </button>
        </div>
      </div>

      <!-- Reset -->
      <button
        class="icon-btn"
        type="button"
        (click)="resetAllFilters()"
        title="Reset All Filters"
      >
        <i class="fas fa-sync-alt"></i>
      </button>
    </div>

    <!-- ROW 2: Filters + Settings (All in one row with equal widths) -->
    <div class="filters-row d-flex align-items-center gap-2">
      <!-- Search Case By -->
      <select
        class="filter-control"
        [(ngModel)]="searchCaseBy"
        name="searchCaseBy"
        (change)="onSearchCaseByChange($event)"
      >
        <option value="">Search Case By</option>
        <option
          *ngFor="let filter of availableFilters"
          [value]="filter.name"
          [disabled]="appliedFilterTypes.has(filter.name)"
        >
          {{ "search.filters.filter." + filter.name + ".head" | translate }}
        </option>
      </select>

      <!-- Search Metadata Input with Add Button -->
      <div class="metadata-input-group">
        <!-- Text Input -->
        <ng-container
          *ngIf="!isDateField(searchCaseBy) && !isYearField(searchCaseBy)"
        >
          <div class="metadata-input-wrapper">
            <input
              type="text"
              class="metadata-input"
              placeholder="Search Metadata"
              name="searchMetadata"
              [(ngModel)]="searchMetadata"
              (input)="onMetadataInputChange()"
              (keydown)="handleKeyDown($event)"
              (focus)="onMetadataFocus()"
              [attr.autocomplete]="'off'"
              [readonly]="!searchCaseBy"
            />
            <ul *ngIf="metadataSuggestions.length" class="suggestion-list">
              <li
                *ngFor="let suggestion of metadataSuggestions; let i = index"
                [class.active]="i === activeSuggestionIndex"
                (mousedown)="selectSuggestion(suggestion)"
              >
                <span [innerHTML]="highlightMatch(suggestion.label)"></span>
                ({{ suggestion.count }})
              </li>
            </ul>
          </div>
        </ng-container>

        <!-- Date Range -->
        <ng-container *ngIf="isDateField(searchCaseBy)">
          <div class="date-range-filter">
            <div class="date-wrap-inline">
              <input
                id="dateFrom"
                type="text"
                placeholder="From Date"
                ngbDatepicker
                #dDateFrom="ngbDatepicker"
                [(ngModel)]="dateFrom"
                name="fromDate"
                (click)="dDateFrom.toggle()"
                class="form-control date-input-ngb"
                readonly
              />
              <button
                type="button"
                class="calendar-icon"
                (click)="dDateFrom.toggle()"
              >
                <i class="pi pi-calendar"></i>
              </button>
            </div>

            <div class="date-wrap-inline">
              <input
                id="dateTo"
                type="text"
                placeholder="To Date"
                ngbDatepicker
                #dDateTo="ngbDatepicker"
                [(ngModel)]="dateTo"
                (click)="dDateTo.toggle()"
                name="toDate"
                class="form-control date-input-ngb"
                readonly
              />
              <button
                type="button"
                class="calendar-icon"
                (click)="dDateTo.toggle()"
              >
                <i class="pi pi-calendar"></i>
              </button>
            </div>
          </div>
        </ng-container>

        <!-- Year Range -->
        <ng-container *ngIf="isYearField(searchCaseBy)">
          <div class="year-range-filter">
            <p-datepicker
              [(ngModel)]="yearFrom"
              view="year"
              dateFormat="yy"
              [showIcon]="true"
              placeholder="From Year"
              name="fromYear"
            ></p-datepicker>
            <span>to</span>
            <p-datepicker
              [(ngModel)]="yearTo"
              name="toYear"
              view="year"
              dateFormat="yy"
              [showIcon]="true"
              placeholder="To Year"
            ></p-datepicker>
          </div>
        </ng-container>

        <!-- Add Button -->
        <button
          class="metadata-add-btn"
          type="button"
          (click)="addMetadataFilter()"
        >
          <i class="fas fa-plus"></i>
        </button>
      </div>

      <!-- Reset Button -->
      <button
        class="icon-btn"
        type="button"
        (click)="clearAllMetadataFilters()"
        title="Reset Metadata Filters"
      >
        <i class="fas fa-sync-alt"></i>
      </button>

      <!-- Sort By -->
      <select
        class="filter-control"
        [(ngModel)]="sortBy"
        name="sortBy"
        (change)="onSortChange()"
      >
        <option value="dc.date.accessioned" disabled selected hidden>
          Sort By
        </option>
        <option value="dc.title">Case Number</option>
        <option value="dc.CaseYear">Case Year</option>
        <option value="dc.CaseStatus">Case Status</option>
        <option value="dc.Petitioner">Petitioner Name</option>
      </select>

      <!-- Sort Order -->
      <select
        class="filter-control"
        [(ngModel)]="sortOrder"
        name="sortOrder"
        (change)="onSortOrderChange()"
      >
        <option value="asc" disabled selected hidden>Sort Order</option>

        <option value="asc">Ascending</option>
        <option value="desc">Descending</option>
      </select>

      <!-- Results Per Page -->
      <select
        class="filter-control"
        [(ngModel)]="resultPerPage"
        name="resultPerPage"
        (change)="onResultPerPageChange()"
      >
        <option value="">Result Per Pages</option>
        <option value="5">5</option>
        <option value="10">10</option>
        <option value="20">20</option>
        <option value="50">50</option>
        <option value="100">100</option>
      </select>
    </div>
    <!-- Filter Tags -->
    <div class="filter-tags" *ngIf="filterTags.length > 0">
      <span *ngFor="let tag of filterTags; let i = index" class="filter-tag">
        <span style="color: #174377">{{
          tag.label === "title" ? "CaseNo" : tag.label
        }}</span>
        :
        <span style="color: #f94f00">{{ tag.value }}</span>
        <span class="close" (click)="removeFilterTag(i)">×</span>
      </span>
    </div>
  </div>
</form>
